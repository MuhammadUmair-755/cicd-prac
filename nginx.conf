server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any route React Router owns,
    # so refreshing /about or /projects does not return a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively (filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
